# Pinned dependency set for reproducible package venvs. Resolved on the OLDEST
# target (Rocky 9 / Python 3.9) so every pin also installs on Ubuntu 24.04
# (3.12) and 26.04 (3.14) — older releases run on newer Pythons, not vice versa
# (e.g. click 8.2+ dropped 3.9). importlib_metadata/zipp are Flask's 3.9
# backports; harmless extras on newer Pythons. Regenerate on Rocky 9 with:
#   docker run --rm rockylinux:9 sh -c 'dnf -y -q install python3 python3-pip && \
#     python3 -m venv /v && \
#     /v/bin/pip install -q flask flask-sock simple-websocket websocket-client && \
#     /v/bin/pip freeze'
